# {{ ansible_managed }}
# busradar.pihaar.de — Busradar BW reverse proxy (Unix socket)

upstream busradar_backend {
    server unix:/run/busradar/uvicorn.sock;
}

map $uri $busradar_cache {
    default         "public, max-age=60";
    ~^/sw\.js$      "no-cache, no-store, must-revalidate";
    ~^/(fonts|vendor|icons)/ "public, max-age=2592000";
    ~^/api/         "no-store";
}

server {
    listen 443 quic;
    listen 443 ssl;
    listen [::]:443 quic;
    listen [::]:443 ssl;
    http2 on;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    ssl_certificate     /etc/nginx/certs/live/pihaar.de/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/pihaar.de/privkey.pem;

    server_name busradar.pihaar.de;

    # Security headers (alle Responses — erbt in location / da dort kein add_header)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cache-Control $busradar_cache always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;

    # Service Worker
    location = /sw.js {
        proxy_pass http://busradar_backend;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # API (Rate-Limited)
    location /api/ {
        proxy_pass http://busradar_backend;
        limit_req zone=busradar_api burst=20 nodelay;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store" always;
    }

    # Default (alle anderen Pfade — erbt server-level add_header)
    location / {
        proxy_pass http://busradar_backend;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name busradar.pihaar.de;
    return 301 https://busradar.pihaar.de$request_uri;
}
